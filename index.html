<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
    }

    /* タブ */
    .tabs {
        position: fixed;
        bottom: 0;
        width: 100%;
        display: flex;
        background: #fff;
        border-top: 1px solid #ccc;
    }
    .tab {
        flex: 1;
        text-align: center;
        padding: 12px 0;
        cursor: pointer;
    }
    .tab.active {
        background: #e0f2f1;
        font-weight: bold;
    }

    .page {
        display: none;
        padding: 16px;
        padding-bottom: 80px;
    }
    .page.active {
        display: block;
    }

    /* カレンダー */
    #calendar {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        margin-top: 10px;
    }
    .day {
        background: #fff;
        padding: 10px;
        text-align: center;
        border-radius: 6px;
        border: 1px solid #ddd;
        cursor: pointer;
    }
    .today {
        background: #ffe0b2;
        border-color: #ff9800;
    }
    .selected {
        background: #b2dfdb;
        border-color: #009688;
    }
    .dot {
        width: 6px;
        height: 6px;
        background: #009688;
        border-radius: 50%;
        margin: 4px auto 0;
    }

    textarea {
        width: 100%;
        height: 120px;
        margin-top: 10px;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        resize: none;
    }

    /* リンク */
    .link-item {
        background: #fff;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    /* 画像 */
    .img-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
    }
    .img-box {
        background: #fff;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        text-align: center;
    }
    .img-box img {
        width: 100%;
        border-radius: 6px;
    }

    /* 画像追加モーダル */
    #img-modal {
        display:none;
        position:fixed;
        top:0; left:0;
        width:100%; height:100%;
        background:rgba(0,0,0,0.5);
        justify-content:center;
        align-items:center;
    }
    #img-modal-content {
        background:#fff;
        padding:20px;
        border-radius:8px;
        width:90%;
        max-width:300px;
        text-align:center;
    }
</style>
</head>
<body>

<!-- 予定 -->
<div id="page-schedule" class="page active">
    <h2>予定</h2>

    <div style="display:flex; justify-content:space-between;">
        <button onclick="changeMonth(-1)">←</button>
        <div id="calendar-title"></div>
        <button onclick="changeMonth(1)">→</button>
    </div>

    <div id="calendar"></div>

    <h3 id="selected-date-title"></h3>
    <textarea id="memo" placeholder="予定を入力…"></textarea>
</div>

<!-- リンク -->
<div id="page-links" class="page">
    <h2>リンク集</h2>

    <input id="link-search" placeholder="検索…" oninput="loadLinks()" style="width:100%; padding:8px; margin-bottom:10px;">

    <div id="link-list"></div>

    <input id="link-name" placeholder="名前" style="width:48%; padding:8px;">
    <input id="link-url" placeholder="URL" style="width:48%; padding:8px;">
    <button onclick="addLink()">追加</button>

    <hr>

    <button onclick="pasteURL()" style="width:100%; padding:10px;">コピーしたURLを追加</button>
</div>

<!-- 画像 -->
<div id="page-images" class="page">
    <h2>画像ストック</h2>

    <button onclick="document.getElementById('img-input').click()" style="padding:10px; width:100%;">画像を追加</button>
    <input type="file" id="img-input" accept="image/*" style="display:none;">

    <input id="img-search" placeholder="画像検索…" oninput="loadImages()" style="width:100%; padding:8px; margin:10px 0;">

    <div id="img-grid" class="img-grid"></div>
</div>

<!-- 画像追加モーダル -->
<div id="img-modal">
    <div id="img-modal-content">
        <h3>画像を追加</h3>
        <img id="img-preview" style="width:100%; border-radius:6px; margin-bottom:10px;">
        <input id="img-name-input" placeholder="名前を入力" style="width:100%; padding:8px; margin-bottom:10px;">
        <button onclick="saveImage()" style="width:100%; padding:10px; margin-bottom:6px;">保存</button>
        <button onclick="closeImgModal()" style="width:100%; padding:10px;">キャンセル</button>
    </div>
</div>

<!-- タブ -->
<div class="tabs">
    <div class="tab active" onclick="switchPage('schedule', this)">予定</div>
    <div class="tab" onclick="switchPage('links', this)">リンク</div>
    <div class="tab" onclick="switchPage('images', this)">画像</div>
</div>

<script>
/* ページ切り替え */
function switchPage(page, tab) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page-" + page).classList.add('active');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
}

/* カレンダー */
let current = new Date();
let selectedDate = null;

function generateCalendar() {
    const year = current.getFullYear();
    const month = current.getMonth();

    document.getElementById("calendar-title").textContent = `${year}年 ${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for (let i = 0; i < firstDay; i++) {
        cal.innerHTML += `<div></div>`;
    }

    for (let d = 1; d <= lastDate; d++) {
        const dateStr = `${year}-${month + 1}-${d}`;
        const today = new Date();
        let cls = "day";

        if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
            cls += " today";
        }
        if (dateStr === selectedDate) cls += " selected";

        const hasMemo = localStorage.getItem("memo-" + dateStr);

        cal.innerHTML += `
            <div class="${cls}" onclick="selectDate('${dateStr}')">
                ${d}
                ${hasMemo ? '<div class="dot"></div>' : ''}
            </div>
        `;
    }
}

function changeMonth(diff) {
    current.setMonth(current.getMonth() + diff);
    generateCalendar();
}

function selectDate(date) {
    selectedDate = date;
    document.getElementById("selected-date-title").textContent = date;
    document.getElementById("memo").value = localStorage.getItem("memo-" + date) || "";
    generateCalendar();
}

document.getElementById("memo").oninput = () => {
    if (selectedDate) {
        localStorage.setItem("memo-" + selectedDate, document.getElementById("memo").value);
        generateCalendar();
    }
};

generateCalendar();

/* リンク */
function loadLinks() {
    const keyword = document.getElementById("link-search").value.toLowerCase();
    const list = JSON.parse(localStorage.getItem("links") || "[]");
    const container = document.getElementById("link-list");
    container.innerHTML = "";

    list
        .filter(item => item.name.toLowerCase().includes(keyword))
        .forEach((item, index) => {
            container.innerHTML += `
                <div class="link-item">
                    <a href="${item.url}" target="_blank">${item.name}</a>
                    <button onclick="deleteLink(${index})">削除</button>
                </div>
            `;
        });
}

function addLink() {
    const name = document.getElementById("link-name").value;
    const url = document.getElementById("link-url").value;
    if (!name || !url) return;

    const list = JSON.parse(localStorage.getItem("links") || "[]");
    list.push({ name, url });
    localStorage.setItem("links", JSON.stringify(list));
    loadLinks();
}

function deleteLink(i) {
    const list = JSON.parse(localStorage.getItem("links") || "[]");
    list.splice(i, 1);
    localStorage.setItem("links", JSON.stringify(list));
    loadLinks();
}

loadLinks();

async function pasteURL() {
    try {
        const text = await navigator.clipboard.readText();
        if (!/^https?:\/\//.test(text)) {
            alert("コピーされた内容がURLではありません");
            return;
        }
        document.getElementById("link-url").value = text;
        alert("URL欄に貼り付けました");
    } catch {
        alert("クリップボードの読み取りが許可されていません");
    }
}

/* 画像 */
let tempImageData = null;

document.getElementById("img-input").onchange = function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function () {
        tempImageData = reader.result;
        document.getElementById("img-preview").src = tempImageData;
        document.getElementById("img-modal").style.display = "flex";
    };
    reader.readAsDataURL(file);
};

function saveImage() {
    const name = document.getElementById("img-name-input").value;
    if (!name) {
        alert("名前を入力してください");
        return;
    }

    const list = JSON.parse(localStorage.getItem("images") || "[]");
    list.push({
        id: Date.now(),
        name,
        src: tempImageData
    });

    localStorage.setItem("images", JSON.stringify(list));

    closeImgModal();
    loadImages();
}

function closeImgModal() {
    document.getElementById("img-modal").style.display = "none";
    document.getElementById("img-name-input").value = "";
    tempImageData = null;
}

function loadImages() {
    const keyword = document.getElementById("img-search").value.toLowerCase();
    const list = JSON.parse(localStorage.getItem("images") || "[]");
    const grid = document.getElementById("img-grid");
    grid.innerHTML = "";

    list
        .filter(item => item.name.toLowerCase().includes(keyword))
        .forEach(item => {
            grid.innerHTML += `
                <div class="img-box">
                    <img src="${item.src}">
                    <div>${item.name}</div>
                    <button onclick="editImageName(${item.id})">名前変更</button>
                    <button onclick="deleteImage(${item.id})">削除</button>
                </div>
            `;
        });
}

function editImageName(id) {
    const list = JSON.parse(localStorage.getItem("images") || "[]");
    const img = list.find(i => i.id === id);
    if (!img) return;

    const newName = prompt("新しい名前を入力してください", img.name);
    if (!newName) return;

    img.name = newName;
    localStorage.setItem("images", JSON.stringify(list));
    loadImages();
}

function deleteImage(id) {
    let list = JSON.parse(localStorage.getItem("images") || "[]");
    list = list.filter(i => i.id !== id);
    localStorage.setItem("images", JSON.stringify(list));
    loadImages();
}

loadImages();
</script>

</body>
</html>
