<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI対戦型 神経衰弱（メモリーマッチ）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c; /* ダークブルーの背景 */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* コンテンツが上から表示されるように変更 */
            /* 画面全体にフィットさせるための変更 (min-heightに、オーバーフローを許可) */
            min-height: 100vh; 
            padding: 10px; 
            overflow-y: auto; /* 垂直スクロールを許可 */
        }
        #game-container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            padding: 12px;
            /* 垂直方向のflexコンテナとして設定 */
            flex-direction: column;
            display: flex;
            /* height: 100%; を削除し、コンテンツの高さに合わせる */
            overflow: visible; /* コンテナ自体はスクロールさせず、bodyに任せる */
        }
        
        #game-board {
            /* グリッド設定とギャップはJSで動的に適用されます */
            display: grid;
            margin-top: 10px; 
            /* ボードを中央に配置 */
            max-width: 100%;
            width: fit-content; /* グリッド幅をコンテンツに合わせる */
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 20px; /* 下部に見やすいマージンを追加 */
        }
        .card {
            aspect-ratio: 1 / 1; /* 正方形を維持 (視認性のため維持します) */
            background-color: #2d3748; /* カードの裏面の色 */
            border-radius: 6px; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1em; /* #game-boardのfont-sizeに依存 */
            color: #1a202c; 
            cursor: pointer;
            transition: transform 0.6s, background-color 0.3s, box-shadow 0.3s;
            transform-style: preserve-3d;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.5); 
            user-select: none;
        }
        /* カードをめくった時の状態 */
        .card.flipped {
            background-color: #f7fafc; 
            transform: rotateY(180deg);
            color: #38a169; 
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.7);
        }
        /* ペアが一致した時の一般的なスタイル */
        .card.matched {
            cursor: default;
            pointer-events: none;
            transform: none; 
            color: #1a202c; 
        }
        /* 人間がマッチしたペアの色 (青系) */
        .card.matched-human {
            background-color: #63b3ed; 
        }
        /* AIがマッチしたペアの色 (赤系) */
        .card.matched-ai {
            background-color: #fc8181; 
        }
        
        /* 動きを伴う要素がクリックされた時のフィードバック */
        button:active, .card:active:not(.flipped) {
            transform: scale(0.98);
        }

        /* モーダル */
        #modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background-color: #2d3748;
            color: #f7fafc;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            max-width: 90%;
        }

        /* モバイル対応 */
        @media (max-width: 640px) {
            /* モバイルではCSSのギャップ設定を削除し、JSで制御を一本化 */
        }
    </style>
</head>
<body>

<!-- p-4をp-3に変更し、画面の高さ全体を使うように -->
<div id="game-container" class="bg-gray-800 p-3 rounded-xl shadow-2xl flex flex-col">
    <h1 class="text-3xl font-extrabold text-teal-400 mb-3">🧠 AI対戦型 メモリーマッチ</h1>
    
    <!-- 難易度選択UI -->
    <div class="mb-3 flex justify-center items-center flex-wrap">
        <label for="difficulty" class="text-gray-300 mr-3 font-semibold mb-1 sm:mb-0 text-sm sm:text-base">難易度:</label>
        <select id="difficulty" class="p-1 sm:p-2 rounded-lg bg-gray-700 text-white border border-gray-600 text-sm focus:ring-teal-500 focus:border-teal-500">
            <option value="easy">簡単 (4x4, 8ペア)</option>
            <option value="normal">普通 (6x4, 12ペア)</option>
            <option value="hard">難しい (6x6, 18ペア)</option>
            <option value="very_hard">超難関 (8x8, 32ペア)</option>
        </select>
    </div>

    <!-- スコアとターン表示 -->
    <div id="status" class="grid grid-cols-3 gap-2 text-gray-200 text-sm sm:text-lg font-bold mb-3 p-2 bg-gray-700 rounded-lg">
        <span class="text-blue-300">あなた: <span id="humanScore">0</span> P</span>
        <span class="text-red-300">AI: <span id="aiScore">0</span> P</span>
        <span class="text-yellow-300">ターン: <span id="movesCount">0</span></span>
    </div>
    <h2 class="text-lg font-bold mb-3 text-gray-100">
        現在のターン: <span id="currentPlayer" class="text-yellow-400">あなた</span>
    </h2>

    <!-- ボードを格納するラッパー。flex-growを削除し、コンテンツのサイズに依存させる -->
    <div id="board-wrapper" class="p-0 flex justify-center items-start">
        <div id="game-board">
            <!-- カードはJavaScriptで生成されます -->
        </div>
    </div>

</div>

<!-- 終了モーダル -->
<div id="modal-overlay">
    <div class="modal-content">
        <!-- 勝者メッセージはJSで更新されます -->
        <h2 class="text-3xl font-bold mb-4 text-yellow-400">ゲームクリア！</h2>
        <p class="text-xl mb-6">
            合計 <span id="finalMoves">0</span> ターンで終了しました。
        </p>
        <!-- ゲーム終了モーダルからリセットボタンを再配置し、ゲームを再開できるようにする -->
        <button id="modalResetButton" class="px-8 py-3 bg-teal-500 text-white font-bold rounded-xl shadow-lg hover:bg-teal-600 transition duration-150 transform active:scale-95">
            もう一度プレイ
        </button>
    </div>
</div>

<script>
    // ゲーム設定
    // 32ペア分のシンボルを用意
    const ALL_CARD_SYMBOLS = [
        '🍎', '🍌', '🍇', '🍋', '🍉', '🍓', '🥝', '🥭', '🍍', '🥥', '🍒', '🍑',
        '🍊', '🥑', '🍆', '🌶️', '🌽', '🥕', '🥔', '🍠', '🍄', '🌰', '🥜', '🍞', 
        '🧀', '🥩', '🥓', '🥚', '🥛', '☕', '🍵', '🍻'
    ];
    
    // 難易度設定の定義 (ペア数、列数、行数)
    const GAME_CONFIGS = {
        'easy': { pairs: 8, columns: 4, rows: 4, label: '簡単 (4x4, 8ペア)' },
        'normal': { pairs: 12, columns: 6, rows: 4, label: '普通 (6x4, 12ペア)' }, // 4x6から6x4に変更
        'hard': { pairs: 18, columns: 6, rows: 6, label: '難しい (6x6, 18ペア)' },
        'very_hard': { pairs: 32, columns: 8, rows: 8, label: '超難関 (8x8, 32ペア)' }
    };

    // カード間のギャップ (ピクセル) - 6から5に縮小
    const CARD_GAP = 5; 
    
    // AIの思考時間設定 (AI強化のため、遅延を短縮)
    const AI_FLIP_DELAY = 300; // AIがカードをめくる間の遅延（ミリ秒）
    const AI_TURN_DELAY = 600; // AIのターン開始時の遅延（ミリ秒）

    // **ユーザーの要望によるカードの目標サイズ (px) - これを上限とする**
    const TARGET_CARD_SIZE_PX = 90; 

    // DOM要素の取得
    const gameBoard = document.getElementById('game-board');
    const boardWrapper = document.getElementById('board-wrapper'); 
    const movesCountElement = document.getElementById('movesCount');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalResetButton = document.getElementById('modalResetButton');
    const finalMovesElement = document.getElementById('finalMoves');
    const difficultySelect = document.getElementById('difficulty');
    
    // UI要素
    const humanScoreElement = document.getElementById('humanScore');
    const aiScoreElement = document.getElementById('aiScore');
    const currentPlayerElement = document.getElementById('currentPlayer');

    // ゲーム状態
    let gameCards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let isClickLocked = false;
    let currentConfig = GAME_CONFIGS.easy;
    
    // AI対戦用の追加状態
    let humanScore = 0;
    let aiScore = 0;
    let currentPlayer = 'human'; // 'human' or 'ai'
    // AIの記憶力強化: ターンを問わず、めくられたカードを記憶する
    let aiMemory = new Map(); // AIの記憶 { id: symbol }

    /**
     * 配列をシャッフルするフィッシャー・イェーツ・アルゴリズム
     */
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [
                array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    /**
     * スコアとターンUIを更新します。
     */
    function updateScoresAndTurn() {
        humanScoreElement.textContent = humanScore;
        aiScoreElement.textContent = aiScore;
        currentPlayerElement.textContent = (currentPlayer === 'human' ? 'あなた' : 'AI');
        currentPlayerElement.classList.toggle('text-yellow-400', currentPlayer === 'human');
        currentPlayerElement.classList.toggle('text-red-400', currentPlayer === 'ai');
    }

    /**
     * ゲームボードを初期化し、新しいゲームを開始します。
     */
    function initializeGame() {
        // 選択された難易度を読み込む
        currentConfig = GAME_CONFIGS[difficultySelect.value];
        const symbolsToUse = ALL_CARD_SYMBOLS.slice(0, currentConfig.pairs);
        
        // 1. カード配列を作成
        gameCards = shuffle([...symbolsToUse, ...symbolsToUse]).map((symbol, index) => ({
            id: index,
            symbol: symbol,
            isFlipped: false,
            isMatched: false,
            matchedBy: null // 'human' or 'ai'
        }));

        // 2. 状態をリセット
        flippedCards = [];
        matchedPairs = 0;
        moves = 0;
        isClickLocked = false;
        
        // AI対戦用の状態をリセット
        humanScore = 0;
        aiScore = 0;
        currentPlayer = 'human';
        aiMemory.clear();

        // 3. UIを更新
        updateScoresAndTurn();
        movesCountElement.textContent = moves; 
        modalOverlay.style.display = 'none';

        // 4. ボードのDOMを再描画
        renderBoard();
    }

    /**
     * ゲームボードのDOMを生成/更新し、サイズを動的に調整します。
     */
    function renderBoard() {
        gameBoard.innerHTML = '';
        
        const { columns } = currentConfig; // rowsは垂直スクロールを許可するため、サイズ計算には使用しない

        // グリッドレイアウトとギャップを動的に設定
        gameBoard.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
        gameBoard.style.gap = `${CARD_GAP}px`;

        // 1. ボードラッパーのサイズを取得 (横幅の制約に使用)
        const wrapperWidth = boardWrapper.clientWidth;
        
        // 2. 幅から導かれるカードの最大許容サイズ (横スクロールを防ぐため、これを上限とする)
        const maxCardSizeByWidth = (wrapperWidth - (columns - 1) * CARD_GAP) / columns;
        
        // 3. 最終的なカードサイズを決定: 
        //    目標サイズ (TARGET_CARD_SIZE_PX) と幅による最大許容サイズのうち、
        //    小さい方を採用することで、横スクロールを防ぎつつ、カードを可能な限り大きくする。
        const cardSize = Math.floor(Math.min(TARGET_CARD_SIZE_PX, maxCardSizeByWidth));
        
        // 4. cardSizeから最適なフォントサイズを設定
        // カードサイズの約40%をフォントサイズにする (px指定)
        const fontSizePx = Math.max(10, cardSize * 0.4); // 最小サイズ10pxを保証
        
        // #game-board (グリッドコンテナ) のフォントサイズを設定
        gameBoard.style.fontSize = `${fontSizePx}px`;
        
        // カードのサイズを計算したcardSizeに固定し、flexの伸縮を防ぐ
        const cardStyle = `width: ${cardSize}px; height: ${cardSize}px;`;

        gameCards.forEach(card => {
            const cardElement = document.createElement('div');
            cardElement.classList.add('card', 'select-none');
            cardElement.dataset.id = card.id;
            cardElement.style.cssText = cardStyle; // カードのサイズを適用
            
            // カードの表裏を設定
            if (card.isFlipped || card.isMatched) {
                cardElement.classList.add('flipped');
                
                if (card.isMatched) {
                    cardElement.classList.add('matched');
                    if (card.matchedBy === 'human') {
                        cardElement.classList.add('matched-human');
                    } else if (card.matchedBy === 'ai') {
                        cardElement.classList.add('matched-ai');
                    }
                }
                cardElement.textContent = card.symbol;
            } else {
                cardElement.textContent = ''; // 裏面は空
            }

            // 人間のクリックハンドラを設定
            cardElement.addEventListener('click', () => handleCardClick(card.id));
            gameBoard.appendChild(cardElement);
        });
    }

    /**
     * 人間がカードをクリックした時の処理 (AIターン中はブロック)
     * @param {number} id クリックされたカードのID
     */
    function handleCardClick(id) {
        // AIのターン中は人間のクリックを無視
        if (isClickLocked || currentPlayer === 'ai' || flippedCards.length === 2) {
            return;
        }

        const card = gameCards.find(c => c.id === id);

        // 既にめくられている、マッチしている場合は無視
        if (card.isFlipped || card.isMatched) {
            return;
        }
        
        // カードをめくる処理を開始
        flipCard(card, false); // false: 人間によるフリップ
    }
    
    /**
     * カードをめくる主要なロジック
     */
    function flipCard(card, byAI) {
        if (card.isFlipped || card.isMatched || flippedCards.length >= 2) return;

        // 1. カードをめくる
        card.isFlipped = true;
        flippedCards.push(card);
        renderCard(card);
        
        // AIはめくられたカードをすべて記憶する (byAIに関わらず)
        aiMemory.set(card.id, card.symbol);

        // 2. 2枚めくられたかチェック
        if (flippedCards.length === 2) {
            processTurn();
        }
    }

    /**
     * 2枚めくられた後のターン処理
     */
    function processTurn() {
        moves++;
        movesCountElement.textContent = moves;
        isClickLocked = true; // 処理中はクリックをロック

        const [card1, card2] = flippedCards;

        if (card1.symbol === card2.symbol) {
            // ペア一致
            setTimeout(() => {
                handleMatch(card1, card2);
            }, 800);
        } else {
            // ペア不一致
            setTimeout(() => {
                handleMismatch(card1, card2);
            }, 1200);
        }
    }

    /**
     * ペアが一致した時の処理
     */
    function handleMatch(card1, card2) {
        card1.isMatched = true;
        card2.isMatched = true;
        
        // 誰がマッチさせたかを記録
        card1.matchedBy = currentPlayer;
        card2.matchedBy = currentPlayer;

        // スコア更新
        if (currentPlayer === 'human') {
            humanScore++;
        } else {
            aiScore++;
        }
        
        // マッチしたカードは誰が取っても記憶から削除する
        aiMemory.delete(card1.id);
        aiMemory.delete(card2.id);

        matchedPairs++;
        updateScoresAndTurn();

        renderCard(card1);
        renderCard(card2);
        flippedCards = [];

        if (matchedPairs === currentConfig.pairs) {
            showWinModal();
        } else {
            // マッチした場合はターンを維持
            isClickLocked = false; 
            if (currentPlayer === 'ai') {
                 // AIが連続マッチした場合、少し待って次のAIターンを開始 (AI速度強化済み)
                 setTimeout(aiTurn, AI_TURN_DELAY); 
            }
        }
    }

    /**
     * ペアが不一致だった時の処理
     */
    function handleMismatch(card1, card2) {
        card1.isFlipped = false;
        card2.isFlipped = false;

        renderCard(card1);
        renderCard(card2);
        flippedCards = [];

        // ターンを切り替える
        switchTurn();
    }
    
    /**
     * ターンを人間とAIで切り替える
     */
    function switchTurn() {
        currentPlayer = (currentPlayer === 'human' ? 'ai' : 'human');
        updateScoresAndTurn();
        isClickLocked = false; // ロックを解除（次のプレイヤーに制御を渡す）

        if (currentPlayer === 'ai') {
            isClickLocked = true; // AIのターン中はロック
            // AIターンを開始 (AI速度強化済み)
            setTimeout(aiTurn, AI_TURN_DELAY);
        }
    }
    
    /**
     * 特定のカードのDOMだけを更新する
     */
    function renderCard(card) {
        const cardElement = gameBoard.querySelector(`[data-id='${card.id}']`);
        if (!cardElement) return;

        // 既存のマッチクラスを削除
        cardElement.classList.remove('flipped', 'matched', 'matched-human', 'matched-ai');
        
        if (card.isFlipped) {
            cardElement.classList.add('flipped');
            cardElement.textContent = card.symbol;
        } else {
            cardElement.textContent = ''; // 裏面
        }

        if (card.isMatched) {
            cardElement.classList.add('matched');
            // マッチさせたプレイヤーに応じてクラスを追加
            if (card.matchedBy === 'human') {
                cardElement.classList.add('matched-human');
            } else if (card.matchedBy === 'ai') {
                cardElement.classList.add('matched-ai');
            }
            cardElement.textContent = card.symbol; 
        }
    }
    
    // --- AIロジック ---

    /**
     * AIのターン処理
     */
    function aiTurn() {
        // AIが選ぶカードIDのペアを取得
        const cardIds = aiChooseCards();
        const card1Id = cardIds[0];
        const card2Id = cardIds[1];
        
        // 1. 1枚目をめくる
        const card1 = gameCards.find(c => c.id === card1Id);
        if (card1) {
            flipCard(card1, true);

            // 2. 2枚目をめくる (遅延後)
            setTimeout(() => {
                const card2 = gameCards.find(c => c.id === card2Id);
                if (card2) {
                    flipCard(card2, true);
                } else {
                     // 念のため
                    isClickLocked = false; 
                    switchTurn(); 
                }
            }, AI_FLIP_DELAY);
        } else {
            isClickLocked = false;
        }
    }

    /**
     * AIがめくるカードのIDを2枚選択する (記憶優先)
     */
    function aiChooseCards() {
        // 裏向きで、まだマッチしていないカードのIDリスト
        const unmatchedCardIds = gameCards.filter(c => !c.isFlipped && !c.isMatched).map(c => c.id);

        // 1. 記憶 (aiMemory) からペアを探す
        let memoryPairs = [];
        const seenSymbols = new Map(); // { symbol: id }
        
        // AIはこれまでにめくられたすべてのカードを記憶しているため、効率的にペアを探せる
        for (const [id, symbol] of aiMemory.entries()) {
            if (unmatchedCardIds.includes(id)) { // まだ裏向きのカードのみ考慮
                if (seenSymbols.has(symbol)) {
                    // ペアが見つかった！
                    memoryPairs.push([seenSymbols.get(symbol), id]);
                } else {
                    seenSymbols.set(symbol, id);
                }
            }
        }
        
        if (memoryPairs.length > 0) {
            // 確実なペアがあればそれを使用
            return memoryPairs[0];
        }

        // 2. ランダムに2枚選択
        if (unmatchedCardIds.length >= 2) {
            const shuffledIds = shuffle([...unmatchedCardIds]);
            return [shuffledIds[0], shuffledIds[1]];
        }
        
        return []; // 2枚未満の場合は空
    }

    /**
     * 勝利モーダルを表示します。
     */
    function showWinModal() {
        isClickLocked = true;
        let winnerMessage;
        
        if (humanScore > aiScore) {
            winnerMessage = "あなたの勝利です！🎉";
        } else if (aiScore > humanScore) {
            winnerMessage = "AIの勝利です... 🤖";
        } else {
            winnerMessage = "引き分けです！🤝";
        }

        document.querySelector('.modal-content h2').textContent = winnerMessage;
        finalMovesElement.textContent = moves;
        modalOverlay.style.display = 'flex';
    }

    // --- イベントリスナー ---
    modalResetButton.addEventListener('click', initializeGame);
    
    // 難易度セレクタが変更されたら即座にゲームを初期化する
    difficultySelect.addEventListener('change', initializeGame);

    // ウィンドウサイズ変更時にボードを再描画してサイズを調整
    window.addEventListener('resize', () => {
        // カードが存在する場合のみ再描画（ゲームが始まっている場合）
        if (gameCards.length > 0) {
            renderBoard();
        }
    });

    // 初期起動
    initializeGame();

</script>

</body>
</html>
